<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil Digital</title>

    <!-- Aquí empieza el CSS (El diseño) -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .tarjeta {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }

        h1 {
            color: #4f46e5;
            margin-bottom: 5px;
        }

        .subtitulo {
            color: #6b7280;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .boton {
            background-color: #4f46e5;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .boton:hover {
            background-color: #3730a3;
        }
    </style>
</head>
<body>

<!-- Aquí empieza el HTML (El contenido) -->
<div class="tarjeta">
    <h1>Tu Nombre Aquí</h1>
    <div class="subtitulo">Futuro Desarrollador Web</div>
    <p>¡Hola! Estoy aprendiendo a programar páginas web. Este es mi primer diseño usando HTML y CSS estructurado desde cero. ¡Y se ve genial!</p>
    <a href="https://github.com" target="_blank" class="boton">Ver mi GitHub</a>
</div>

</body>
</html>
